name: Release

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Bump version
        run: |
          LAST_MSG=$(git log -1 --pretty=%s)
          if echo "$LAST_MSG" | grep -qE '^chore\(release\):'; then
            echo "Last commit was a release bump, skipping version bump"
            exit 0
          fi
          npm version minor --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore(release): v${NEW_VERSION}"
          git push origin ${{ github.ref_name }}

      - name: Get version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: Create and push tag
        run: |
          TAG="v$(node -p "require('./package.json').version")"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"

  build-windows:
    needs: prepare
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npx electron-forge make --platform win32 --arch x64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: out/make/

  build-macos:
    needs: prepare
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npx electron-forge make --platform darwin --arch x64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - run: npx electron-forge make --platform darwin --arch arm64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: out/make/

  release:
    needs: [prepare, build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate latest.yml for electron-updater
        run: |
          VERSION="${{ needs.prepare.outputs.tag }}"
          VERSION="${VERSION#v}"
          EXE=$(find artifacts/windows -name "*.exe" -type f | head -1)
          if [ -z "$EXE" ]; then
            echo "No Windows exe found in artifacts"
            exit 1
          fi
          REL_PATH="${EXE#artifacts/}"
          FILENAME=$(basename "$EXE")
          SHA512=$(sha512sum "$EXE" | awk '{print $1}')
          SIZE=$(stat -c%s "$EXE")
          RELEASE_DATE=$(date -u +%Y-%m-%dT%H:%M:%S.000Z)
          {
            echo "version: $VERSION"
            echo "files:"
            echo "  - url: \"$REL_PATH\""
            echo "    sha512: $SHA512"
            echo "    size: $SIZE"
            echo "path: \"$REL_PATH\""
            echo "sha512: $SHA512"
            echo "releaseDate: $RELEASE_DATE"
          } > artifacts/latest.yml

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: Release ${{ needs.prepare.outputs.tag }}
          generate_release_notes: true
          replace_assets: true
          files: |
            artifacts/windows/**/*.exe
            artifacts/windows/**/*.zip
            artifacts/macos/**/*
            artifacts/latest.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
