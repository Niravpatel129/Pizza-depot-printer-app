name: Release on Tag

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npx electron-forge make --platform win32 --arch x64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: out/make/

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npx electron-forge make --platform darwin --arch x64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - run: npx electron-forge make --platform darwin --arch arm64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: out/make/

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate latest.yml for electron-updater
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          EXE=$(find artifacts/windows -name "*.exe" -type f | head -1)
          if [ -z "$EXE" ]; then
            echo "No Windows exe found in artifacts"
            exit 1
          fi
          REL_PATH="${EXE#artifacts/}"
          SHA512=$(sha512sum "$EXE" | awk '{print $1}')
          SIZE=$(stat -c%s "$EXE")
          RELEASE_DATE=$(date -u +%Y-%m-%dT%H:%M:%S.000Z)
          {
            echo "version: $VERSION"
            echo "files:"
            echo "  - url: \"$REL_PATH\""
            echo "    sha512: $SHA512"
            echo "    size: $SIZE"
            echo "path: \"$REL_PATH\""
            echo "sha512: $SHA512"
            echo "releaseDate: $RELEASE_DATE"
          } > artifacts/latest.yml

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          replace_assets: true
          files: |
            artifacts/windows/**/*.exe
            artifacts/windows/**/*.zip
            artifacts/macos/**/*
            artifacts/latest.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
