<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Printer Agent</title>
  <style>
    body { font-family: system-ui, sans-serif; padding: 12px 16px; margin: 0; }
    label { display: block; margin-bottom: 4px; font-size: 12px; color: #666; }
    input, select { width: 100%; padding: 6px 8px; box-sizing: border-box; margin-bottom: 12px; }
    select { cursor: pointer; }
    button { padding: 6px 16px; background: #0066cc; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
  </style>
</head>
<body>
  <label>Default printer</label>
  <select id="printer">
    <option value="">System default</option>
  </select>
  <button id="save">Save</button>
</body>
</html>
